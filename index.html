<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Blast Clone</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
        }
        h1 { margin-bottom: 5px; color: #f1f5f9; }
        #score-board { font-size: 1.8rem; margin-bottom: 20px; color: #38bdf8; font-weight: bold; }
        #grid {
            display: grid;
            grid-template-columns: repeat(8, 45px);
            grid-template-rows: repeat(8, 45px);
            gap: 6px;
            background-color: #1e293b;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .cell {
            background-color: #334155;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }
        .cell:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }
        #block-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-top: 35px;
            min-height: 120px;
            width: 100%;
            max-width: 450px;
        }
        .available-block {
            border: 2px dashed #475569;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: grid;
            gap: 4px;
            background-color: #1e293b;
            transition: all 0.2s;
        }
        .available-block:hover {
            border-color: #38bdf8;
            transform: translateY(-4px);
        }
        .available-block.selected {
            border-color: #38bdf8;
            background-color: #0f172a;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }
        .mini-cell {
            width: 22px;
            height: 22px;
            border-radius: 4px;
        }
        .empty-mini-cell {
            width: 22px;
            height: 22px;
        }
        #restart-btn {
            margin-top: 25px;
            padding: 10px 20px;
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
        }
        #restart-btn:hover { background-color: #dc2626; }
    </style>
</head>
<body>

    <h1>BLOCK BLAST</h1>
    <div id="score-board">Skor: <span id="score">0</span></div>
    
    <div id="grid"></div>
    
    <div id="block-container"></div>
    
    <button id="restart-btn" onclick="resetGame()">Ulang Game</button>

    <script>
        // Variasi bentuk blok (Matrix 1 = terisi, 0 = kosong)
        const SHAPES = [
            { matrix: [[1]], color: '#ef4444' }, // 1x1 Kotak Merah
            { matrix: [[1, 1]], color: '#3b82f6' }, // 1x2 Batang Biru
            { matrix: [[1], [1]], color: '#3b82f6' }, // 2x1 Batang Biru Vertikal
            { matrix: [[1, 1], [1, 1]], color: '#10b981' }, // 2x2 Kotak Besar Hijau
            { matrix: [[1, 1, 1]], color: '#f59e0b' }, // 1x3 Batang Oranye
            { matrix: [[1], [1], [1]], color: '#f59e0b' }, // 3x1 Batang Oranye Vertikal
            { matrix: [[1, 0], [1, 1]], color: '#8b5cf6' }, // Bentuk L kecil Ungu
            { matrix: [[1, 1, 1], [0, 1, 0]], color: '#ec4899' } // Bentuk T Pink
        ];

        let grid = Array(8).fill().map(() => Array(8).fill(0));
        let score = 0;
        let availableBlocks = [];
        let selectedBlockIndex = null;

        // Memulai Game
        function initGame() {
            createGridDOM();
            spawnBlocks();
            renderGrid();
            renderAvailableBlocks();
            updateScore();
        }

        // Membuat element Grid di HTML
        function createGridDOM() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.onclick = () => handleGridClick(r, c);
                    gridElement.appendChild(cell);
                }
            }
        }

        // Menghasilkan 3 blok acak di bawah
        function spawnBlocks() {
            availableBlocks = [];
            for (let i = 0; i < 3; i++) {
                let rand = Math.floor(Math.random() * SHAPES.length);
                availableBlocks.push(JSON.parse(JSON.stringify(SHAPES[rand])));
            }
        }

        // Menggambar ulang kondisi papan utama
        function renderGrid() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                let r = parseInt(cell.dataset.row);
                let c = parseInt(cell.dataset.col);
                if (grid[r][c] !== 0) {
                    cell.style.backgroundColor = grid[r][c];
                } else {
                    cell.style.backgroundColor = '#334155';
                }
            });
        }

        // Menggambar 3 opsi blok pilihan di bawah
        function renderAvailableBlocks() {
            const container = document.getElementById('block-container');
            container.innerHTML = '';

            availableBlocks.forEach((block, index) => {
                if (!block) {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.style.width = '100px';
                    container.appendChild(emptyDiv);
                    return;
                }

                const blockDiv = document.createElement('div');
                blockDiv.className = 'available-block' + (selectedBlockIndex === index ? ' selected' : '');
                blockDiv.style.gridTemplateRows = `repeat(${block.matrix.length}, 22px)`;
                blockDiv.style.gridTemplateColumns = `repeat(${block.matrix[0].length}, 22px)`;
                
                blockDiv.onclick = (e) => {
                    e.stopPropagation();
                    selectedBlockIndex = index;
                    renderAvailableBlocks();
                };

                for (let r = 0; r < block.matrix.length; r++) {
                    for (let c = 0; c < block.matrix[r].length; c++) {
                        const miniCell = document.createElement('div');
                        if (block.matrix[r][c] === 1) {
                            miniCell.className = 'mini-cell';
                            miniCell.style.backgroundColor = block.color;
                        } else {
                            miniCell.className = 'empty-mini-cell';
                        }
                        blockDiv.appendChild(miniCell);
                    }
                }
                container.appendChild(blockDiv);
            });
        }

        // Logika saat grid utama diklik
        function handleGridClick(r, c) {
            if (selectedBlockIndex === null || !availableBlocks[selectedBlockIndex]) return;

            let block = availableBlocks[selectedBlockIndex];

            if (canPlace(block, r, c)) {
                // Letakkan blok ke dalam grid data
                for (let br = 0; br < block.matrix.length; br++) {
                    for (let bc = 0; bc < block.matrix[br].length; bc++) {
                        if (block.matrix[br][bc] === 1) {
                            grid[r + br][c + bc] = block.color;
                        }
                    }
                }

                score += 10; // Poin dasar menaruh blok
                availableBlocks[selectedBlockIndex] = null;
                selectedBlockIndex = null;

                // Jika ketiga blok sudah habis, munculkan 3 baru
                if (availableBlocks.every(b => b === null)) {
                    spawnBlocks();
                }

                checkAndClearLines();
                renderGrid();
                renderAvailableBlocks();
                updateScore();

                // Cek apakah game over
                if (checkGameOver()) {
                    setTimeout(() => {
                        alert('Game Over! Skor Akhir Anda: ' + score);
                        resetGame();
                    }, 200);
                }
            }
        }

        // Fungsi cek validasi space kosong
        function canPlace(block, startRow, startCol) {
            for (let r = 0; r < block.matrix.length; r++) {
                for (let c = 0; c < block.matrix[r].length; c++) {
                    if (block.matrix[r][c] === 1) {
                        let targetR = startRow + r;
                        let targetC = startCol + c;
                        if (targetR >= 8 || targetC >= 8 || grid[targetR][targetC] !== 0) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        // Menghapus baris/kolom yang penuh layaknya Block Blast
        function checkAndClearLines() {
            let rowsToClear = [];
            let colsToClear = [];

            // Cek Baris Horisontal
            for (let r = 0; r < 8; r++) {
                if (grid[r].every(cell => cell !== 0)) rowsToClear.push(r);
            }

            // Cek Kolom Vertikal
            for (let c = 0; c < 8; c++) {
                let full = true;
                for (let r = 0; r < 8; r++) {
                    if (grid[r][c] === 0) { full = false; break; }
                }
                if (full) colsToClear.push(c);
            }

            // Eksekusi penghapusan data baris
            rowsToClear.forEach(r => {
                for (let c = 0; c < 8; c++) grid[r][c] = 0;
            });

            // Eksekusi penghapusan data kolom
            colsToClear.forEach(c => {
                for (let r = 0; r < 8; r++) grid[r][c] = 0;
            });

            // Hitung Bonus Skor Kombinasi Line
            let totalCleared = rowsToClear.length + colsToClear.length;
            if (totalCleared > 0) {
                score += totalCleared * 100;
            }
        }

        // Sistem Deteksi Kalah (jika sisa blok tidak muat dimanapun)
        function checkGameOver() {
            let activeBlocks = availableBlocks.filter(b => b !== null);
            if (activeBlocks.length === 0) return false;

            for (let block of activeBlocks) {
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        if (canPlace(block, r, c)) {
                            return false; // Masih ada tempat muat
                        }
                    }
                }
            }
            return true; // Kalah total
        }

        function updateScore() {
            document.getElementById('score').innerText = score;
        }

        function resetGame() {
            grid = Array(8).fill().map(() => Array(8).fill(0));
            score = 0;
            selectedBlockIndex = null;
            spawnBlocks();
            renderGrid();
            renderAvailableBlocks();
            updateScore();
        }

        // Jalankan game saat halaman selesai dimuat
        window.onload = initGame;
    </script>
</body>
</html>
